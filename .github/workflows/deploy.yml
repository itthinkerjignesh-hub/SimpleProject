name: PHP CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Fake Production Folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "E:\xampp\htdocs\fake_production"

      - name: Deploy Project Files
        shell: powershell
        run: |

          $source = "${{ github.workspace }}"
          $destination = "E:\xampp\htdocs\fake_production"

          robocopy $source $destination /E `
            /XD ".git" ".github" `
            /XF "database.sql" "config\database.php"

      - name: Run Database Migrations
        run: |
          php E:\xampp\htdocs\fake_production\run_migrations.php

      - name: Success Message
        run: echo Deployment Successful