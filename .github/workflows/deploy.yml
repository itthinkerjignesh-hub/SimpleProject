name: PHP CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Fake Production Folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "E:\xampp\htdocs\fake_production"

      - name: Deploy Project Files
        shell: powershell
        run: |

          $source = "${{ github.workspace }}"
          $destination = "E:\xampp\htdocs\fake_production"

          robocopy $source $destination /E /MT:8 `
            /XD ".git" ".github" `
            /XF "database.php" "database.sql"

          if ($LASTEXITCODE -le 3) {
            Write-Host "Robocopy Success"
            exit 0
          } else {
            Write-Host "Robocopy Failed"
            exit $LASTEXITCODE
          }

      - name: Run Database Migrations
        shell: powershell
        run: |
          php E:\xampp\htdocs\fake_production\run_migrations.php

      - name: Deployment Success
        run: echo "Deployment Completed Successfully"